#
# Recommend use for static configuration that does not change between environments.
#
# See also config/application.properties
#
causeway:

  applib:
    annotation:
      action:
        explicit: true
        command-publishing: ignore_safe
        execution-publishing: all
      action-layout:
        css-class:
          patterns:
            delete.*:btn-danger,
            discard.*:btn-warning,
            remove.*:btn-warning
      domain-object:
        auditing: all
        publishing: all
      property:
        command-publishing: all
        execution-publishing: all

  core:
    meta-model:
      introspector:
        lock-after-full-introspection: true
        class-exclusions: domox.nlp.**
      validator:
        allow-deprecated: false
        no-params-only: true
        explicit-object-type: true

    runtime-services:
      translation:
        po:
          mode: disabled

  viewer:
    wicket:
      application:
        about: Simple App
        brand-logo-header: images/domox_logo_48.svg
        css: css/application.css
        favicon-url: images/favicon.png
        js: scripts/application.js
        #menubars-layout-xml: menubars.layout.xml
        name: DoMoX
        version: ^project.version^


        # https://stackoverflow.com/a/38983935/56880

      credit:
        - url:  http://causeway.apache.org
          image: images/apache-causeway/logo-48x48.png
          name: Apache Causeway

      themes:
        show-chooser: false

      max-title-length-in-standalone-tables: 0
      max-title-length-in-parented-tables: 0

      bookmarked-pages:
        show-chooser: false
        show-drop-down-on-footer: true

  persistence:
    schema:
      #auto-create-schemas: domox
      create-schema-sql-template: "CREATE SCHEMA IF NOT EXISTS %S"
      #create-schema-sql-template: DROP SCHEMA domox CASCADE


resteasy:
  jaxrs:
    app:
      registration: beans
    defaultPath: "/restful"

server:
  max-http-request-header-size: 16KB

spring:
  banner:
    location: banner.txt
  main:
    web-application-type: SERVLET
  datasource:
    driverClassName: org.postgresql.Driver
  # Exclude Spring Boot 4.0.0-M3 autoconfiguration classes that are incompatible with Spring Boot 3.5.13
#  autoconfigure:
 #   exclude:
  #      - org.springframework.boot.actuate.autoconfigure.health.HealthIndicatorsSupplier
   #     - org.springframework.boot.actuate.autoconfigure.tracing.TracingAutoConfiguration

  quartz:
    job-store-type: memory

management:
  endpoint:
    health:
      enabled: true

app:
  simple-module:
    types:
      name:
        validation:
          message: "'{character}' is invalid."
          prohibited-characters: "&%$!"
